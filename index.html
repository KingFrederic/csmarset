                            <div className="relative">
                                <div className="img-reveal aspect-[3/4] overflow-hidden">
                                    <img src="https://images.unsplash.com/photo-1558171813-4c088753af8f?q=80&w=1200" alt="Chelsea Smartset Atelier" className="w-full h-full object-cover" loading="lazy" />
                                </div>
                                <div className={`absolute -bottom-6 -left-6 md:-left-10 px-6 py-4 ${isDark ? 'bg-pure-black' : 'bg-pure-white'}`}>
                                    <p className="text-[9px] font-bold uppercase tracking-[0.3em] text-gold">Est. Lagos, Nigeria</p>
                                    <p className={`text-[9px] uppercase tracking-[0.2em] mt-1 ${isDark ? 'text-zinc-500' : 'text-zinc-400'}`}>Crafting Since 2020</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* ─── EDITORIAL LOOKBOOK ──────────────────────── */}
                    <section id="lookbook" className={`py-28 md:py-40 ${isDark ? 'bg-zinc-950' : 'bg-cream'}`}>
                        <div className="max-w-[1400px] mx-auto px-6 md:px-20">
                            <div className="reveal text-center mb-20">
                                <p className="text-[10px] font-bold uppercase tracking-[0.4em] text-gold mb-4">Editorial</p>
                                <h2 className="text-4xl md:text-7xl font-display font-bold uppercase tracking-tighter italic">The Lookbook</h2>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-4">
                                {[
                                    { img: "https://images.unsplash.com/photo-1509631179647-0177331693ae?q=80&w=800", span: "md:col-span-2 md:row-span-2" },
                                    { img: "https://images.unsplash.com/photo-1485462537746-965f33f7f6a7?q=80&w=800", span: "" },
                                    { img: "https://images.unsplash.com/photo-1502716119720-b23a1e3b7f56?q=80&w=800", span: "" },
                                    { img: "https://images.unsplash.com/photo-1518577915332-c2a19f149a75?q=80&w=800", span: "md:col-span-2" },
                                    { img: "https://images.unsplash.com/photo-1551803091-e20673f15770?q=80&w=800", span: "" },
                                ].map((item, i) => (
                                    <div key={i} className={`img-reveal overflow-hidden group ${item.span}`}>
                                        <div className={`${i === 0 ? 'aspect-[4/5]' : 'aspect-[3/4]'} overflow-hidden`}>
                                            <img src={item.img} alt={`Lookbook ${i+1}`} className="w-full h-full object-cover transition-transform duration-[1.5s] group-hover:scale-105" loading="lazy" />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ─── PRODUCT COLLECTION ──────────────────────── */}
                    <section id="collection" className="max-w-[1600px] mx-auto px-6 md:px-20 py-28 md:py-40">
                        <div className="reveal flex flex-col md:flex-row md:items-end md:justify-between mb-16 gap-6">
                            <div>
                                <p className="text-[10px] font-bold uppercase tracking-[0.4em] text-gold mb-4">Shop</p>
                                <h2 className="text-4xl md:text-7xl font-display font-bold uppercase tracking-tighter italic">The Collection</h2>
                            </div>
                            <p className={`text-sm max-w-sm ${isDark ? 'text-zinc-500' : 'text-zinc-400'}`}>
                                {filteredProducts.length} {filteredProducts.length === 1 ? 'piece' : 'pieces'} — Each crafted in limited quantities
                            </p>
                        </div>

                        {/* Category Filters */}
                        <div className="reveal flex flex-wrap gap-3 mb-14">
                            {CATEGORIES.map(cat => (
                                <button key={cat} onClick={() => setActiveCategory(cat)}
                                    className={`px-5 py-2.5 text-[9px] font-bold uppercase tracking-[0.2em] border transition-all duration-300 ${
                                        activeCategory === cat
                                            ? 'bg-gold text-pure-black border-gold'
                                            : isDark
                                                ? 'border-white/10 text-white/60 hover:border-white/30 hover:text-white'
                                                : 'border-black/10 text-black/60 hover:border-black/30 hover:text-black'
                                    }`}>
                                    {cat}
                                </button>
                            ))}
                        </div>

                        {/* Product Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-16">
                            {filteredProducts.map((p, index) => (
                                <div key={p.id} className="reveal group">
                                    <div className="relative aspect-[3/4] overflow-hidden bg-zinc-900">
                                        <img src={p.img} alt={p.name} className="w-full h-full object-cover transition-all duration-[1.2s] group-hover:scale-105 grayscale-[30%] group-hover:grayscale-0" loading="lazy" />

                                        {/* Quick Add Overlay */}
                                        <div className="absolute inset-0 flex flex-col items-center justify-end pb-8 opacity-0 group-hover:opacity-100 transition-all duration-500 bg-gradient-to-t from-black/70 via-transparent to-transparent">
                                            {/* Size Selector */}
                                            <div className="flex gap-2 mb-4">
                                                {SIZES.map(s => (
                                                    <button key={s} onClick={(e) => { e.stopPropagation(); setSelectedSize({...selectedSize, [p.id]: s}); }}
                                                        className={`w-9 h-9 text-[9px] font-bold border transition-all ${
                                                            (selectedSize[p.id] || "M") === s
                                                                ? 'bg-white text-black border-white'
                                                                : 'border-white/40 text-white hover:border-white'
                                                        }`}>
                                                        {s}
                                                    </button>
                                                ))}
                                            </div>
                                            <button onClick={() => addToCart(p)}
                                                className="px-10 py-4 bg-white text-black text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-gold hover:text-pure-black transition-colors shadow-2xl">
                                                Add to Bag — ₦{p.price.toLocaleString()}
                                            </button>
                                        </div>

                                        {/* Tag Badge */}
                                        <div className="absolute top-4 left-4">
                                            <span className={`px-3 py-1.5 text-[8px] font-bold uppercase tracking-[0.15em] ${
                                                p.tag === 'LIMITED' || p.tag === 'COUTURE' ? 'bg-gold text-pure-black' : 'bg-white/90 text-black'
                                            }`}>{p.tag}</span>
                                        </div>
                                    </div>

                                    <div className="mt-5 flex justify-between items-start gap-4">
                                        <div>
                                            <p className={`text-[8px] font-bold uppercase tracking-[0.2em] mb-1.5 ${isDark ? 'text-zinc-500' : 'text-zinc-400'}`}>{p.material}</p>
                                            <h3 className="text-lg font-display uppercase font-bold tracking-tight">{p.name}</h3>
                                            <div className="flex gap-1.5 mt-2">
                                                {p.colors.map(c => (
                                                    <span key={c} className={`text-[8px] uppercase tracking-wider ${isDark ? 'text-zinc-600' : 'text-zinc-400'}`}>{c}</span>
                                                ))}
                                            </div>
                                        </div>
                                        <span className="text-lg font-display font-medium whitespace-nowrap">₦{p.price.toLocaleString()}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* ─── PRESS / SOCIAL PROOF ────────────────────── */}
                    <section className={`py-24 md:py-32 ${isDark ? 'bg-zinc-950' : 'bg-cream'}`}>
                        <div className="max-w-[1200px] mx-auto px-6 md:px-20">
                            <div className="reveal text-center mb-16">
                                <p className="text-[10px] font-bold uppercase tracking-[0.4em] text-gold mb-4">As Seen In</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                {PRESS.map((item, i) => (
                                    <div key={i} className="reveal text-center py-8">
                                        <p className={`text-3xl md:text-4xl font-display font-bold uppercase tracking-tight mb-4 ${isDark ? 'text-white/20' : 'text-black/15'}`}>{item.name}</p>
                                        <p className={`text-sm md:text-base italic max-w-xs mx-auto ${isDark ? 'text-zinc-400' : 'text-zinc-500'}`}>"{item.quote}"</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ─── FEATURED HIGHLIGHT ──────────────────────── */}
                    <section className="relative h-[80vh] md:h-screen overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1525507119028-ed4c629a60a3?q=80&w=2070" alt="Featured Collection" className="absolute inset-0 w-full h-full object-cover" loading="lazy" />
                        <div className="absolute inset-0 bg-black/50"></div>
                        <div className="relative z-10 h-full flex flex-col items-center justify-center text-center px-6">
                            <div className="reveal">
                                <p className="text-[10px] font-bold uppercase tracking-[0.5em] text-gold mb-6">Editor's Pick</p>
                                <h2 className="text-5xl md:text-8xl font-display font-bold uppercase tracking-tighter text-white leading-[0.9] mb-6">
                                    The Silk<br/>Empress Set
                                </h2>
                                <p className="text-zinc-400 max-w-md mx-auto text-sm mb-10 leading-relaxed">
                                    Our most coveted piece — hand-finished mulberry silk with mother-of-pearl buttons. Available in Ivory and Noir. Selling fast.
                                </p>
                                <button onClick={() => { addToCart(PRODUCTS[0]); }}
                                    className="px-10 py-5 border border-white/30 text-white text-[10px] font-bold uppercase tracking-[0.3em] hover:bg-white hover:text-black transition-all duration-500">
                                    Shop Now — ₦95,000
                                </button>
                            </div>
                        </div>
                    </section>

                    {/* ─── NEWSLETTER ──────────────────────────────── */}
                    <section className={`py-24 md:py-32 ${isDark ? 'bg-pure-black' : 'bg-pure-white'}`}>
                        <div className="max-w-xl mx-auto px-6 text-center">
                            <div className="reveal">
                                <p className="text-[10px] font-bold uppercase tracking-[0.4em] text-gold mb-4">Stay in the World</p>
                                <h2 className="text-3xl md:text-5xl font-display font-bold uppercase tracking-tighter mb-4">Join the Inner Circle</h2>
                                <p className={`text-sm mb-10 ${isDark ? 'text-zinc-500' : 'text-zinc-400'}`}>
                                    Early access to new drops, exclusive offers, and styling inspiration — delivered to your inbox.
                                </p>
                                {newsletterSubmitted ? (
                                    <div className="py-6">
                                        <p className="text-gold text-sm font-bold uppercase tracking-widest">Welcome to the circle.</p>
                                        <p className={`text-[10px] mt-2 ${isDark ? 'text-zinc-500' : 'text-zinc-400'}`}>Check your inbox for a special welcome.</p>
                                    </div>
                                ) : (
                                    <form onSubmit={handleNewsletter} className="flex flex-col sm:flex-row gap-3">
                                        <input
                                            type="email"
                                            required
                                            value={newsletterEmail}
                                            onChange={(e) => setNewsletterEmail(e.target.value)}
                                            placeholder="Your email address"
                                            className={`flex-1 px-6 py-4 text-sm border bg-transparent outline-none transition-colors ${isDark ? 'border-white/10 focus:border-white/30 placeholder:text-zinc-600' : 'border-black/10 focus:border-black/30 placeholder:text-zinc-400'}`}
                                        />
                                        <button type="submit" className="px-8 py-4 bg-gold text-pure-black text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-gold-light transition-colors whitespace-nowrap">
                                            Subscribe
                                        </button>
                                    </form>
                                )}
                                <p className={`text-[8px] mt-4 ${isDark ? 'text-zinc-700' : 'text-zinc-300'}`}>No spam. Unsubscribe anytime. We respect your privacy.</p>
                            </div>
                        </div>
                    </section>

                    {/* ─── FOOTER ──────────────────────────────────── */}
                    <footer className={`pt-20 pb-10 px-6 md:px-20 border-t ${isDark ? 'border-white/5' : 'border-black/5'}`}>
                        <div className="max-w-[1400px] mx-auto">
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-12 md:gap-8 mb-20">
                                {/* Brand Column */}
                                <div className="md:col-span-1">
                                    <h3 className="text-xl font-display font-bold uppercase tracking-tight mb-4">Chelsea Smartset</h3>
                                    <p className={`text-sm leading-relaxed mb-6 ${isDark ? 'text-zinc-500' : 'text-zinc-400'}`}>
                                        The Digital Atelier. African luxury, globally delivered.
                                    </p>
                                    <div className="flex gap-4">
                                        <a href="https://www.instagram.com/csmartset/" target="_blank" rel="noopener noreferrer" className={`p-2 border rounded-full transition-colors ${isDark ? 'border-white/10 hover:border-white/30' : 'border-black/10 hover:border-black/30'}`} aria-label="Instagram">
                                            <i data-lucide="instagram" className="w-4 h-4"></i>
                                        </a>
                                        <a href="https://wa.me/2349069133312" target="_blank" rel="noopener noreferrer" className={`p-2 border rounded-full transition-colors ${isDark ? 'border-white/10 hover:border-white/30' : 'border-black/10 hover:border-black/30'}`} aria-label="WhatsApp">
                                            <i data-lucide="message-circle" className="w-4 h-4"></i>
                                        </a>
                                    </div>
                                </div>

                                {/* Shop Column */}
                                <div>
                                    <h4 className="text-[10px] font-bold uppercase tracking-[0.3em] mb-6">Shop</h4>
                                    <ul className="space-y-3">
                                        {["New Arrivals", "Dresses", "Sets", "Gowns", "Suits", "Separates"].map(item => (
                                            <li key={item}><a href="#collection" className={`text-sm transition-colors ${isDark ? 'text-zinc-500 hover:text-white' : 'text-zinc-400 hover:text-black'}`}>{item}</a></li>
                                        ))}
                                    </ul>
                                </div>

                                {/* Customer Care Column */}
                                <div>
                                    <h4 className="text-[10px] font-bold uppercase tracking-[0.3em] mb-6">Customer Care</h4>
                                    <ul className="space-y-3">
                                        {["Size Guide", "Shipping & Delivery", "Returns & Exchanges", "Care Instructions", "Contact Us"].map(item => (
                                            <li key={item}><a href="#" className={`text-sm transition-colors ${isDark ? 'text-zinc-500 hover:text-white' : 'text-zinc-400 hover:text-black'}`}>{item}</a></li>
                                        ))}
                                    </ul>
                                </div>

                                {/* About Column */}
                                <div>
                                    <h4 className="text-[10px] font-bold uppercase tracking-[0.3em] mb-6">About</h4>
                                    <ul className="space-y-3">
                                        {["Our Story", "The Artisans", "Sustainability", "Press", "Careers"].map(item => (
                                            <li key={item}><a href="#" className={`text-sm transition-colors ${isDark ? 'text-zinc-500 hover:text-white' : 'text-zinc-400 hover:text-black'}`}>{item}</a></li>
                                        ))}
                                    </ul>
                                </div>
                            </div>

                            {/* Footer Bottom */}
                            <div className={`pt-8 border-t flex flex-col md:flex-row justify-between items-center gap-6 ${isDark ? 'border-white/5' : 'border-black/5'}`}>
                                <p className={`text-[9px] uppercase tracking-[0.3em] ${isDark ? 'text-zinc-700' : 'text-zinc-300'}`}>
                                    &copy; 2026 Chelsea Smartset. All rights reserved.
                                </p>
                                <div className="flex items-center gap-6">
                                    {["Privacy Policy", "Terms of Service"].map(item => (
                                        <a key={item} href="#" className={`text-[9px] uppercase tracking-[0.2em] transition-colors ${isDark ? 'text-zinc-700 hover:text-zinc-400' : 'text-zinc-300 hover:text-zinc-600'}`}>{item}</a>
                                    ))}
                                </div>
                                <div className="flex items-center gap-3">
                                    <span className={`text-[9px] uppercase tracking-[0.2em] ${isDark ? 'text-zinc-700' : 'text-zinc-300'}`}>We accept</span>
                                    {["Visa", "Mastercard", "Paystack"].map(item => (
                                        <span key={item} className={`text-[9px] font-bold uppercase tracking-wider px-2 py-1 border rounded ${isDark ? 'border-white/5 text-zinc-600' : 'border-black/5 text-zinc-400'}`}>{item}</span>
                                    ))}
                                </div>
                            </div>

                            {/* Large Brand Watermark */}
                            <div className="mt-16 text-center overflow-hidden">
                                <h2 className="text-[12vw] font-display font-bold tracking-tighter uppercase italic opacity-[0.03] leading-none select-none">Chelsea Smartset</h2>
                            </div>
                        </div>
                    </footer>

                    {/* ─── GLASS CART PANEL ────────────────────────── */}
                    <div className={`fixed inset-0 z-[60] flex justify-end transition-all duration-700 ${cartOpen ? 'visible' : 'invisible pointer-events-none'}`}>
                        <div className={`absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity duration-700 ${cartOpen ? 'opacity-100' : 'opacity-0'}`} onClick={() => setCartOpen(false)}></div>
                        <div className={`relative w-full max-w-lg h-full p-8 md:p-12 flex flex-col glass-panel transition-transform duration-700 ease-[cubic-bezier(0.16,1,0.3,1)] ${cartOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                            <div className="flex justify-between items-center mb-8 text-white">
                                <div>
                                    <h2 className="text-2xl font-display font-bold uppercase tracking-tight">Your Bag</h2>
                                    <p className="text-[9px] uppercase tracking-widest text-zinc-500 mt-1">{cart.length} {cart.length === 1 ? 'item' : 'items'}</p>
                                </div>
                                <button onClick={() => setCartOpen(false)} className="hover:rotate-90 transition-transform duration-300 text-white" aria-label="Close cart">
                                    <i data-lucide="x" className="w-5 h-5"></i>
                                </button>
                            </div>

                            <div className="flex-1 overflow-y-auto space-y-6 pr-2">
                                {cart.length === 0 && (
                                    <div className="flex flex-col items-center justify-center h-full text-center">
                                        <i data-lucide="shopping-bag" className="w-12 h-12 text-zinc-700 mb-4"></i>
                                        <p className="text-zinc-500 uppercase text-[10px] tracking-widest mb-2">Your bag is empty</p>
                                        <p className="text-zinc-700 text-[9px] tracking-wide">Explore the collection and find something you love.</p>
                                        <button onClick={() => setCartOpen(false)} className="mt-6 px-6 py-3 border border-white/10 text-white text-[9px] font-bold uppercase tracking-widest hover:bg-white/5 transition-colors">
                                            Continue Shopping
                                        </button>
                                    </div>
                                )}
                                {cart.map((item) => (
                                    <div key={item.cartId} className="flex gap-5 items-start text-white group">
                                        <div className="w-20 h-24 overflow-hidden flex-shrink-0 bg-zinc-900">
                                            <img src={item.img} alt={item.name} className="w-full h-full object-cover" />
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <h4 className="text-[10px] font-black uppercase tracking-widest truncate">{item.name}</h4>
                                            <p className="text-[9px] text-zinc-500 mt-1">Size: {item.size}</p>
                                            <p className="text-sm mt-1 text-zinc-300">₦{item.price.toLocaleString()}</p>
                                            <button onClick={() => removeFromCart(item.cartId)} className="text-[9px] text-zinc-600 mt-2 hover:text-red-400 uppercase tracking-widest transition-colors">Remove</button>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {cart.length > 0 && (
                                <div className="mt-auto pt-8 border-t border-white/10 text-white">
                                    <div className="flex justify-between items-baseline mb-2">
                                        <span className="text-[9px] uppercase tracking-widest text-zinc-500">Subtotal</span>
                                        <span className="text-xl font-display font-bold">₦{total.toLocaleString()}</span>
                                    </div>
                                    <p className="text-[8px] text-zinc-600 mb-6">
                                        {total >= 200000 ? 'You qualify for complimentary shipping' : `₦${(200000 - total).toLocaleString()} away from free shipping`}
                                    </p>
                                    <button onClick={handleCheckout}
                                        className="w-full py-5 bg-gold text-pure-black text-[10px] font-black uppercase tracking-[0.3em] hover:bg-gold-light transition-colors shadow-2xl">
                                        Secure Checkout
                                    </button>
                                    <button onClick={() => setCartOpen(false)}
                                        className="w-full py-4 mt-3 text-[9px] text-zinc-500 uppercase tracking-widest hover:text-white transition-colors">
                                        Continue Shopping
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* ─── BACK TO TOP ─────────────────────────────── */}
                    <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                        className={`fixed bottom-6 right-6 z-50 p-3 rounded-full border transition-all duration-300 ${isDark ? 'bg-pure-black/80 border-white/10 text-white hover:border-white/30' : 'bg-pure-white/80 border-black/10 text-black hover:border-black/30'} backdrop-blur-md`}
                        aria-label="Back to top">
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M5 15l7-7 7 7"/></svg>
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
